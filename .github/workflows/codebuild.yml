name: AWS CodeBuild Dev Build
on: push
permissions:
  id-token: write
  contents: read

jobs:
  BuildDockerImages:
    runs-on: ubuntu-latest
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::124921357472:role/GithubActionCodebuildRole
        role-session-name: github_oidc_push
        aws-region: ap-southeast-2

    - name: Run CodeBuild
      uses: aws-actions/aws-codebuild-run-build@v2
      with:
        project-name: embd-dev-env