name: Trigger CodePipeline
on: push
permissions:
  id-token: write
  contents: read

jobs:
  TriggerPipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: arn:aws:iam::124921357472:role/GithubActionCodebuildRole
        role-session-name: github_oidc_push
        aws-region: ap-southeast-2

    - name: Start CodePipeline and Monitor
      run: |
        echo "Starting pipeline..."
        EXECUTION_ID=$(aws codepipeline start-pipeline-execution --name EMBD-High-Level-Infra-Pipeline --query 'pipelineExecutionId' --output text)
        echo "Pipeline execution ID: $EXECUTION_ID"

        echo "Monitoring pipeline execution..."
        while true; do
          STATUS=$(aws codepipeline get-pipeline-execution --pipeline-name EMBD-High-Level-Infra-Pipeline --pipeline-execution-id $EXECUTION_ID --query 'pipelineExecution.status' --output text)
          echo "Pipeline status: $STATUS"

          if [[ "$STATUS" == "Succeeded" || "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "Stopped" ]]; then
            break
          fi

          sleep 30
        done

        echo "Final status: $STATUS"
        if [[ "$STATUS" != "Succeeded" ]]; then
          exit 1
        fi
