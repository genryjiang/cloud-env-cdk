name: AWS CodeBuild Dev Build
on: push
permissions:
  id-token: write
  contents: read

jobs:
  BuildDockerImages:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::124921357472:role/GithubActionCodebuildRole
          role-session-name: github_oidc_push
          aws-region: ap-southeast-2

      - name: Start CodePipeline execution
        id: start_pipeline
        run: |
          set -euo pipefail
          pipeline_execution_id=$(aws codepipeline start-pipeline-execution \
            --name EMBD-High-Level-Infra-Pipeline \
            --query pipelineExecutionId \
            --output text)
          echo "pipeline_execution_id=$pipeline_execution_id" >> "$GITHUB_OUTPUT"
          echo "Pipeline execution id: $pipeline_execution_id"

      - name: Stream CodeBuild logs
        env:
          PIPELINE_NAME: EMBD-High-Level-Infra-Pipeline
          PIPELINE_EXECUTION_ID: ${{ steps.start_pipeline.outputs.pipeline_execution_id }}
        run: |
          set -euo pipefail
          build_id=""
          for i in {1..60}; do
            build_id=$(aws codepipeline list-action-executions \
              --pipeline-name "$PIPELINE_NAME" \
              --query "actionExecutionDetails[?pipelineExecutionId=='$PIPELINE_EXECUTION_ID' && stageName=='Build' && actionName=='Build'] | [0].output.executionResult.externalExecutionId" \
              --output text)
            if [ -n "$build_id" ] && [ "$build_id" != "None" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$build_id" ] || [ "$build_id" = "None" ]; then
            echo "Failed to locate CodeBuild build for pipeline execution $PIPELINE_EXECUTION_ID" >&2
            exit 1
          fi

          echo "CodeBuild build id: $build_id"
          log_group=$(aws codebuild batch-get-builds --ids "$build_id" --query "builds[0].logs.groupName" --output text)
          log_stream=$(aws codebuild batch-get-builds --ids "$build_id" --query "builds[0].logs.streamName" --output text)
          deep_link=$(aws codebuild batch-get-builds --ids "$build_id" --query "builds[0].logs.deepLink" --output text)
          echo "CodeBuild logs: $deep_link"

          for i in {1..30}; do
            if [ -n "$log_stream" ] && [ "$log_stream" != "None" ]; then
              break
            fi
            sleep 5
            log_stream=$(aws codebuild batch-get-builds --ids "$build_id" --query "builds[0].logs.streamName" --output text)
          done

          if [ -n "$log_group" ] && [ "$log_group" != "None" ] && [ -n "$log_stream" ] && [ "$log_stream" != "None" ]; then
            aws logs tail "$log_group" --log-stream-names "$log_stream" --follow --since 1m &
            tail_pid=$!
          fi

          status=""
          for i in {1..240}; do
            status=$(aws codebuild batch-get-builds --ids "$build_id" --query "builds[0].buildStatus" --output text)
            if [ "$status" != "IN_PROGRESS" ] && [ "$status" != "QUEUED" ]; then
              break
            fi
            sleep 15
          done

          if [ -n "${tail_pid:-}" ]; then
            kill "$tail_pid" || true
            wait "$tail_pid" || true
          fi

          echo "CodeBuild status: $status"
          if [ "$status" != "SUCCEEDED" ]; then
            exit 1
          fi
