version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: ap-southeast-2
    S3_BUCKET: sr8-embd-dev-env-ap-southeast-2
    QNX_SDP: qnx/qnx-sdp.tar.gz
    RTI: rti/rti_connext.tar

phases:
  pre_build:
    commands:
      - mkdir -p artifacts
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URL
      - GIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-6)
      - AMD64_TAG=amd64-$GIT_HASH
      - AMD64_LATEST_TAG=amd64-latest
      - aws s3 cp "s3://${S3_BUCKET}/${QNX_SDP}" "artifacts/qnx800.tar.gz"
      - aws s3 cp "s3://${S3_BUCKET}/${RTI}" "artifacts/rti_connext.tar"
      # Pull existing image for layer caching
      - docker pull $ECR_URL/$IMAGE_REPO_NAME:$AMD64_LATEST_TAG || true
  build:
    commands:
      # Build for AMD64 (linux) with cache
      - docker build --platform linux/amd64 -f docker/Dockerfile --cache-from $ECR_URL/$IMAGE_REPO_NAME:$AMD64_LATEST_TAG --build-arg USER_NAME=developer --build-arg GROUP_NAME=developer --build-arg USER_ID=1000 --build-arg GROUP_ID=1000 --build-arg QNX_SDP_VERSION=8.0 -t $IMAGE_REPO_NAME:$AMD64_TAG .
      - docker build --platform linux/amd64 -f docker/Dockerfile --cache-from $ECR_URL/$IMAGE_REPO_NAME:$AMD64_LATEST_TAG --build-arg USER_NAME=developer --build-arg GROUP_NAME=developer --build-arg USER_ID=1000 --build-arg GROUP_ID=1000 --build-arg QNX_SDP_VERSION=8.0 -t $IMAGE_REPO_NAME:$AMD64_LATEST_TAG .

      # Tag for ECR
      - docker tag $IMAGE_REPO_NAME:$AMD64_TAG $ECR_URL/$IMAGE_REPO_NAME:$AMD64_TAG
      - docker tag $IMAGE_REPO_NAME:$AMD64_LATEST_TAG $ECR_URL/$IMAGE_REPO_NAME:$AMD64_LATEST_TAG
      
  post_build:
    commands:
      - echo Pushing docker images...
      - docker push $ECR_URL/$IMAGE_REPO_NAME:$AMD64_TAG
      - docker push $ECR_URL/$IMAGE_REPO_NAME:$AMD64_LATEST_TAG
